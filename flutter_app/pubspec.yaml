name: akai_app
description: Akai - A beautiful Android keyboard app.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # HTTP for downloading themes from GitHub
  http: ^1.2.0

  # For caching downloaded themes locally
  path_provider: ^2.1.2
  firebase_core: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/themes/
    - assets/themes/matrix.png
    - assets/akai-icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/akai-icon.png"
